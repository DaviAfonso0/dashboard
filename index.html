<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
    <title>Dashboard</title>
    <script src="https://kit.fontawesome.com/49de6f1312.js" crossorigin="anonymous"></script>
</head>
<body>
    <header id="header">
        <h1>
            <a href="index.html">
                <img src="imagens/logo-mobile.png" alt="logo para telas menores" id="logo">
            </a>
        </h1>
        <nav id="nav-header">
            <ul id="lista-nav">
                <li>
                    <a href="#">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Buscar</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fa-regular fa-circle-question"></i>
                        <span>Dúvidas</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fa-regular fa-bell"></i>
                        <span>Notificações</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fa-regular fa-circle-user">
                        </i>
                        <span>Perfil</span>
                    </a
                </li>
            </ul>
        </nav>
    </header>
    <main id="main">
        <section id="tec-dia">
            <h2>Tecnologias que uso no meu dia</h2>
            <div id="grafico-1">
                
            </div>  
            <div>
                <ul id="lista-tecnologias">
                    <li>
                        <span class="legend" id="html"></span>
                        <p>HTML5 <strong>30%</strong></p>
                    </li>
                    <li>
                        <span class="legend" id="css"></span>
                        <p>CSS3 <strong>60%</strong></p>
                    </li>
                    <li>
                        <span class="legend" id="js"></span>
                        <p>JavaScript <strong>10%</strong>
                            
                        </p>
                    </li>
                </ul>
            </div>
        </section>

    </main>
</body>
</html>
